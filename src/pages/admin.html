<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ панел</title>
    <link rel="stylesheet" href="../styles/app.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="navbar-root"></div>

    <main class="container app-main flex-grow-1">
      <section class="page-header-card mb-4">
        <h1 class="h3 mb-1"><i class="bi bi-shield-lock me-2"></i>Админ панел</h1>
        <p class="text-body-secondary mb-0">Управление на роли и модерация на съдържание.</p>
      </section>

      <div id="config-warning" class="mb-3"></div>
      <div id="status-message" class="mb-3"></div>

      <div class="row g-4">
        <div class="col-12 col-xl-7">
          <div class="card border-0 shadow-sm section-card">
            <div class="card-body">
              <h2 class="h5 mb-3"><i class="bi bi-people me-2"></i>Потребители и роли</h2>
              <div class="table-responsive">
                <table class="table align-middle">
                  <thead>
                    <tr>
                      <th>Потребител</th>
                      <th>Роля</th>
                      <th class="text-end">Действие</th>
                    </tr>
                  </thead>
                  <tbody id="users-rows"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-5">
          <div class="card border-0 shadow-sm section-card">
            <div class="card-body">
              <h2 class="h5 mb-3"><i class="bi bi-shield-check me-2"></i>Модерация на рецепти</h2>
              <div id="recipes-admin-list" class="d-grid gap-2"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="page-footer py-3">
      <div class="container text-center text-body-secondary small">RecipeShare © 2026</div>
    </footer>

    <script type="module" src="/src/pages/admin.js"></script>
  </body>
</html>
