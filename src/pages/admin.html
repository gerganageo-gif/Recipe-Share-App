<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ панел</title>
    <link rel="stylesheet" href="../styles/app.css" />
    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.98.0?bundle"
        }
      }
    </script>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="navbar-root"></div>

    <main class="container app-main flex-grow-1">
      <section class="page-header-card mb-4">
        <h1 class="h3 mb-1"><i class="bi bi-shield-lock me-2"></i>Админ панел</h1>
        <p class="text-body-secondary mb-0">Управление на роли и модерация на съдържание.</p>
      </section>

      <div id="config-warning" class="mb-3"></div>
      <div id="status-message" class="mb-3"></div>

      <div class="row g-4">
        <div class="col-12 col-xl-7 d-grid gap-4">
          <div class="card border-0 shadow-sm section-card">
            <div class="card-body">
              <h2 class="h5 mb-3"><i class="bi bi-people me-2"></i>Потребители и роли</h2>
              <div class="table-responsive">
                <table class="table align-middle">
                  <thead>
                    <tr>
                      <th>Потребител</th>
                      <th>Роля</th>
                      <th class="text-end">Действие</th>
                    </tr>
                  </thead>
                  <tbody id="users-rows"></tbody>
                </table>
              </div>
            </div>
          </div>

          <div class="card border-0 shadow-sm section-card">
            <div class="card-body">
              <h2 class="h5 mb-3"><i class="bi bi-activity me-2"></i>Последни събития</h2>
              <div id="recent-activity-status" class="mb-2"></div>
              <div id="recent-activity-list" class="d-grid gap-2"></div>
              <div class="mt-3 d-grid">
                <button id="show-all-activity-btn" class="btn btn-outline-secondary btn-sm d-none">Покажи всички</button>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-xl-5">
          <div class="card border-0 shadow-sm section-card">
            <div class="card-body">
              <h2 class="h5 mb-3"><i class="bi bi-shield-check me-2"></i>Модерация на рецепти</h2>
              <div id="recipes-admin-list" class="d-grid gap-2"></div>
              <div class="mt-3 d-grid">
                <button id="show-all-recipes-btn" class="btn btn-outline-secondary btn-sm d-none">Покажи всички</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal fade" id="recipe-preview-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
          <div class="modal-content">
            <div class="modal-header">
              <h2 class="modal-title fs-5" id="recipe-preview-title">Преглед на рецепта</h2>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Затвори"></button>
            </div>
            <div class="modal-body">
              <p id="recipe-preview-meta" class="small text-body-secondary mb-3"></p>
              <img id="recipe-preview-image" class="img-fluid rounded border mb-3" alt="Преглед на рецепта" />

              <h3 class="h6 mb-2"><i class="bi bi-card-text me-1"></i>Описание</h3>
              <p id="recipe-preview-description" class="small text-body-secondary mb-3"></p>

              <h3 class="h6 mb-2"><i class="bi bi-basket2 me-1"></i>Продукти</h3>
              <p id="recipe-preview-ingredients" class="small text-body-secondary mb-3"></p>

              <h3 class="h6 mb-2"><i class="bi bi-list-check me-1"></i>Начин на приготвяне</h3>
              <p id="recipe-preview-instructions" class="small text-body-secondary mb-3"></p>

              <h3 class="h6 mb-2"><i class="bi bi-chat-left-text me-1"></i>Коментари</h3>
              <div id="recipe-preview-comments" class="d-grid gap-2"></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Затвори</button>
              <button type="button" id="recipe-preview-delete-btn" class="btn btn-outline-danger">
                <i class="bi bi-trash me-1"></i>Изтрий рецепта
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="page-footer py-3">
      <div class="container text-center text-body-secondary small">RecipeShare © 2026</div>
    </footer>

    <script type="module" src="./admin.js"></script>
  </body>
</html>
