<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Моите рецепти</title>
    <link rel="stylesheet" href="../styles/app.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="navbar-root"></div>

    <main class="container app-main flex-grow-1">
      <section class="page-header-card d-flex justify-content-between align-items-start flex-wrap gap-3 mb-3">
        <div>
          <h1 class="h3 mb-1"><i class="bi bi-collection me-2"></i>Моите рецепти</h1>
          <p class="text-body-secondary mb-0">Управлявай твоите публикации на едно място.</p>
        </div>
        <a href="./create-recipe.html" class="btn btn-success">
          <i class="bi bi-plus-circle me-1"></i>Добави рецепта
        </a>
      </section>

      <div id="config-warning" class="mb-3"></div>
      <div id="status-message" class="mb-3"></div>

      <section class="section-card mb-4">
        <div class="card-body">
          <h2 class="h5 section-title"><i class="bi bi-upload"></i>Рецепти, качени от мен</h2>
          <div id="uploaded-status" class="mb-3"></div>
          <div id="uploaded-grid" class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4"></div>
        </div>
      </section>

      <section class="section-card">
        <div class="card-body">
          <h2 class="h5 section-title"><i class="bi bi-heart"></i>Любими рецепти от други автори</h2>
          <div id="favorites-status" class="mb-3"></div>
          <div id="favorites-grid" class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4"></div>
        </div>
      </section>
    </main>

    <footer class="page-footer py-3">
      <div class="container text-center text-body-secondary small">RecipeShare © 2026</div>
    </footer>

    <script type="module" src="/src/pages/myRecipes.js"></script>
  </body>
</html>
