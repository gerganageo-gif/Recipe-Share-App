<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Моят профил</title>
    <link rel="stylesheet" href="../styles/app.css" />
    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.98.0?bundle"
        }
      }
    </script>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="navbar-root"></div>

    <main class="container app-main flex-grow-1">
      <section class="page-header-card mb-3">
        <h1 class="h3 mb-1"><i class="bi bi-person-badge me-2"></i>Моят профил</h1>
        <p class="text-body-secondary mb-0">Актуализирай профилната си информация.</p>
      </section>

      <div id="config-warning" class="mb-3"></div>
      <div id="status-message" class="mb-3"></div>

      <div class="row g-4">
        <div class="col-12 col-lg-4">
          <section class="section-card">
            <div class="card-body text-center">
              <img id="avatar-preview" src="https://placehold.co/280x280?text=Avatar" class="img-fluid rounded-circle border mb-3" alt="Профилна снимка" />
              <h2 id="profile-name" class="h5 mb-1">Потребител</h2>
              <p id="profile-email" class="text-body-secondary small mb-0">user@email.com</p>
            </div>
          </section>
        </div>

        <div class="col-12 col-lg-8">
          <section class="section-card">
            <div class="card-body">
              <h2 class="h5 section-title"><i class="bi bi-gear"></i>Настройки на профила</h2>

              <form id="profile-form" novalidate>
                <div class="mb-3">
                  <label for="displayName" class="form-label">Име</label>
                  <input id="displayName" name="displayName" type="text" class="form-control" maxlength="80" required />
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label">Имейл</label>
                  <input id="email" name="email" type="email" class="form-control" readonly />
                </div>

                <div class="mb-3">
                  <label for="avatarUrl" class="form-label">Avatar URL</label>
                  <input id="avatarUrl" name="avatarUrl" type="url" class="form-control" placeholder="https://..." />
                </div>

                <div class="mb-4">
                  <label for="bio" class="form-label">Кратко био</label>
                  <textarea id="bio" name="bio" class="form-control" rows="4" maxlength="300"></textarea>
                </div>

                <button id="submit-btn" type="submit" class="btn btn-success">
                  <i class="bi bi-check2-circle me-1"></i>Запази профила
                </button>
              </form>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="page-footer py-3">
      <div class="container text-center text-body-secondary small">RecipeShare © 2026</div>
    </footer>

    <script type="module" src="./profile.js"></script>
  </body>
</html>
