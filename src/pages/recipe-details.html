<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Детайли на рецепта</title>
    <link rel="stylesheet" href="../styles/app.css" />
    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.98.0?bundle"
        }
      }
    </script>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div id="navbar-root"></div>

    <main class="container app-main flex-grow-1">
      <section class="page-header-card mb-3">
        <h1 class="h3 mb-1"><i class="bi bi-journal-text me-2"></i>Детайли на рецепта</h1>
        <p class="text-body-secondary mb-0">Прегледай пълната рецепта, добави коментар и отбележи като любима.</p>
      </section>

      <div id="config-warning" class="mb-3"></div>
      <div id="status-message" class="mb-3"></div>
      <section id="recipe-content"></section>

      <section class="mt-4 section-card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <h2 class="h4 mb-0"><i class="bi bi-chat-dots me-2"></i>Коментари</h2>
            <button id="comment-action-btn" type="button" class="btn btn-success btn-sm d-none">
              <i class="bi bi-chat-left-text me-1"></i>Добави коментар
            </button>
          </div>
          <div id="comment-status" class="mb-3"></div>
          <div id="comments-list" class="mb-3"></div>

          <form id="comment-form" class="d-none">
            <div class="mb-2">
              <label for="content" class="form-label">Добави коментар</label>
              <textarea id="content" name="content" class="form-control" rows="3" required></textarea>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success btn-sm">
                <i class="bi bi-send me-1"></i>Публикувай
              </button>
              <button id="comment-cancel-btn" type="button" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-x-lg me-1"></i>Откажи
              </button>
            </div>
          </form>
          <p class="small text-body-secondary mt-3 mb-0">Бъди учтив в обратната връзка към автора.</p>
        </div>
      </section>
    </main>

    <footer class="page-footer py-3">
      <div class="container text-center text-body-secondary small">RecipeShare © 2026</div>
    </footer>

    <script type="module" src="./recipeDetails.js"></script>
  </body>
</html>
